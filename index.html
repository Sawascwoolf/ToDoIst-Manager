<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoist Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Todoist Manager</h1>
        </header>

        <!-- Token Input -->
        <section id="auth-section" class="card">
            <h2>API-Token eingeben</h2>
            <p class="hint">Du findest deinen Token unter <strong>Todoist &rarr; Einstellungen &rarr; Integrationen &rarr; Entwickler</strong>.</p>
            <div class="token-row">
                <input type="password" id="token-input" placeholder="Todoist API-Token">
                <button id="connect-btn" onclick="connect()">Verbinden</button>
            </div>
            <p id="auth-error" class="error hidden"></p>
        </section>

        <!-- Project Selection -->
        <section id="project-section" class="card hidden">
            <h2>Projekt ausw&auml;hlen</h2>
            <select id="project-select" onchange="loadTasks()">
                <option value="">-- Projekt w&auml;hlen --</option>
            </select>
        </section>

        <!-- Filters & Actions -->
        <section id="filter-section" class="card hidden">
            <div class="filter-row">
                <div class="filter-group filter-group-wide">
                    <label>Suche</label>
                    <input type="text" id="filter-search" placeholder="Aufgabe suchen..." oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label>Label</label>
                    <select id="filter-label" onchange="applyFilters()">
                        <option value="">Alle</option>
                    </select>
                </div>
            </div>

            <div class="toggle-filters">
                <div class="toggle-group">
                    <label>Status</label>
                    <div class="toggle-buttons" id="filter-status-toggles">
                        <button class="toggle-btn active" data-value="open" onclick="toggleFilter(this)">Offen</button>
                        <button class="toggle-btn" data-value="completed" onclick="toggleFilter(this)">Erledigt</button>
                    </div>
                </div>
                <div class="toggle-group">
                    <label>Priorit&auml;t</label>
                    <div class="toggle-buttons" id="filter-priority-toggles">
                        <button class="toggle-btn active p1" data-value="4" onclick="toggleFilter(this)">P1</button>
                        <button class="toggle-btn active p2" data-value="3" onclick="toggleFilter(this)">P2</button>
                        <button class="toggle-btn active p3" data-value="2" onclick="toggleFilter(this)">P3</button>
                        <button class="toggle-btn active p4" data-value="1" onclick="toggleFilter(this)">P4</button>
                    </div>
                </div>
                <div class="toggle-group">
                    <label>Verantwortlich</label>
                    <div class="toggle-buttons" id="filter-assignee-toggles">
                        <span class="toggle-hint">Wird nach Laden angezeigt</span>
                    </div>
                </div>
            </div>

            <div class="action-row">
                <div class="selection-info">
                    <label class="checkbox-label">
                        <input type="checkbox" id="select-all" onchange="toggleSelectAll()">
                        Alle ausw&auml;hlen
                    </label>
                    <span id="selection-count">0 ausgew&auml;hlt</span>
                </div>
                <div class="action-buttons">
                    <button class="btn-danger" onclick="reopenSelected()">Als unerledigt markieren</button>
                    <button class="btn-success" onclick="completeSelected()">Als erledigt markieren</button>
                </div>
            </div>
        </section>

        <!-- Progress Bar -->
        <div id="progress-bar" class="card progress-card hidden">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <span class="progress-text"></span>
        </div>

        <!-- Task Table -->
        <section id="task-section" class="card hidden">
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <span>Lade Aufgaben...</span>
            </div>
            <div class="section-controls hidden" id="section-controls">
                <button class="btn-small" onclick="expandAllSections()">Alle aufklappen</button>
                <button class="btn-small" onclick="collapseAllSections()">Alle zuklappen</button>
            </div>
            <div class="table-wrapper">
                <table id="task-table">
                    <thead>
                        <tr>
                            <th class="col-check"></th>
                            <th class="col-task sortable" onclick="sortBy('content')">Aufgabe <span class="sort-icon"></span></th>
                            <th class="col-status">Status</th>
                            <th class="col-priority sortable" onclick="sortBy('priority')">Priorit&auml;t <span class="sort-icon"></span></th>
                            <th class="col-due sortable" onclick="sortBy('due')">F&auml;lligkeit <span class="sort-icon"></span></th>
                            <th class="col-assignee sortable" onclick="sortBy('assignee')">Verantwortlich <span class="sort-icon"></span></th>
                            <th class="col-labels">Labels</th>
                        </tr>
                    </thead>
                    <tbody id="task-body"></tbody>
                </table>
            </div>
            <p id="no-tasks" class="hidden">Keine Aufgaben gefunden.</p>
            <p id="task-count" class="task-count"></p>
        </section>

        <!-- Status Toast -->
        <div id="toast" class="toast hidden"></div>

        <footer class="version-footer">Build #10</footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
