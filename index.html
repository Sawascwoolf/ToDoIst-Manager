<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoist Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar (Token only) -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Einstellungen</h2>
            <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section">
                <label>API-Token</label>
                <p class="hint">Todoist &rarr; Einstellungen &rarr; Integrationen &rarr; Entwickler</p>
                <div class="token-row">
                    <input type="password" id="token-input" placeholder="API-Token">
                    <button id="connect-btn" onclick="connect()">OK</button>
                </div>
                <p id="auth-error" class="error hidden"></p>
            </div>
        </div>
        <div class="sidebar-footer"></div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <div class="main">
        <div class="topbar">
            <button class="hamburger" onclick="toggleSidebar()" title="Einstellungen">&#9776;</button>
            <select id="project-select" class="topbar-select" onchange="loadTasks()" disabled>
                <option value="">Verbinde...</option>
            </select>
            <div id="stats-top" class="stats"></div>
            <div class="build-badge">Build #32</div>
        </div>
        <div id="main-error" class="main-error hidden"></div>

        <!-- Filters -->
        <section id="filter-section" class="filter-bar hidden">
            <div class="filter-row-top">
                <input type="text" id="filter-search" placeholder="Suchen..." oninput="applyFilters()">
                <select id="filter-label" onchange="applyFilters()">
                    <option value="">Label: Alle</option>
                </select>
                <button class="btn-reset-all" onclick="resetAllFilters()">Alle Aufgaben</button>
            </div>
            <div class="toggle-filters">
                <div class="toggle-group">
                    <span class="toggle-label">Status</span>
                    <div class="toggle-buttons" id="filter-status-toggles">
                        <button class="toggle-btn active" data-value="open">Offen</button>
                        <button class="toggle-btn" data-value="completed">Erledigt</button>
                    </div>
                </div>
                <div class="toggle-group">
                    <span class="toggle-label">Prio</span>
                    <div class="toggle-buttons" id="filter-priority-toggles">
                        <button class="toggle-btn active p1" data-value="4">P1</button>
                        <button class="toggle-btn active p2" data-value="3">P2</button>
                        <button class="toggle-btn active p3" data-value="2">P3</button>
                        <button class="toggle-btn active p4" data-value="1">P4</button>
                    </div>
                </div>
                <div class="toggle-group" id="assignee-toggle-group" style="display:none">
                    <span class="toggle-label">Verantw.</span>
                    <div class="toggle-buttons" id="filter-assignee-toggles"></div>
                </div>
            </div>
            <div class="view-config-row">
                <div class="view-slots" id="view-slots"></div>
                <button class="btn-small btn-view-save" onclick="saveCurrentView()" title="Aktuelle Ansicht speichern">+ Ansicht</button>
                <div class="view-spacer"></div>
                <button class="group-toggle-btn active" id="group-toggle" style="display:none">Sektionen</button>
                <button class="group-toggle-btn active" id="hierarchy-toggle">Hierarchie</button>
            </div>
            <div class="action-row">
                <div class="selection-info">
                    <label class="checkbox-label">
                        <input type="checkbox" id="select-all" onchange="toggleSelectAll()">
                        Alle
                    </label>
                    <span id="selection-count"></span>
                </div>
                <button class="btn-create-task" onclick="openCreateTaskDialog()">+ Aufgabe</button>
                <div class="list-menu-wrapper" id="list-menu-wrapper">
                    <button class="actions-btn list-actions-btn" onclick="showListMenu(event)" title="Aktionen">&#8943;</button>
                    <div id="list-menu" class="context-menu hidden">
                        <button class="bulk-only" onclick="listMenuAction('reopenSelected')">Auswahl: Als unerledigt</button>
                        <button class="bulk-only" onclick="listMenuAction('completeSelected')">Auswahl: Als erledigt</button>
                        <div class="ctx-separator bulk-only"></div>
                        <div class="ctx-submenu-wrap bulk-only" id="bulk-priority-wrap">
                            <button class="ctx-has-sub">Auswahl: Priorit&auml;t &#9656;</button>
                            <div class="ctx-submenu" id="bulk-priority-sub">
                                <button onclick="bulkSetPriority(4)"><span class="priority-dot p1-dot"></span> P1</button>
                                <button onclick="bulkSetPriority(3)"><span class="priority-dot p2-dot"></span> P2</button>
                                <button onclick="bulkSetPriority(2)"><span class="priority-dot p3-dot"></span> P3</button>
                                <button onclick="bulkSetPriority(1)"><span class="priority-dot p4-dot"></span> P4</button>
                            </div>
                        </div>
                        <div class="ctx-submenu-wrap bulk-only" id="bulk-assignee-wrap">
                            <button class="ctx-has-sub">Auswahl: Verantwortlicher &#9656;</button>
                            <div class="ctx-submenu" id="bulk-assignee-sub"></div>
                        </div>
                        <div class="ctx-submenu-wrap bulk-only" id="bulk-label-wrap">
                            <button class="ctx-has-sub">Auswahl: Label hinzuf&uuml;gen &#9656;</button>
                            <div class="ctx-submenu" id="bulk-label-sub"></div>
                        </div>
                        <div class="ctx-separator bulk-only"></div>
                        <button onclick="listMenuAction('expandAll')">Alle aufklappen</button>
                        <button onclick="listMenuAction('collapseAll')">Alle zuklappen</button>
                        <div class="ctx-separator"></div>
                        <button onclick="listMenuAction('refresh')">Neu laden</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Progress Bar -->
        <div id="progress-bar" class="progress-card hidden">
            <div class="progress-track"><div class="progress-fill"></div></div>
            <span class="progress-text"></span>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Lade Aufgaben...</span>
        </div>

        <!-- Task Table -->
        <section id="task-section" class="hidden">
            <div class="table-wrapper">
                <table id="task-table">
                    <thead>
                        <tr>
                            <th class="col-check"></th>
                            <th class="col-task sortable" onclick="sortBy('content')">Aufgabe <span class="sort-icon"></span></th>
                            <th class="col-status">Status</th>
                            <th class="col-priority sortable" onclick="sortBy('priority')">Prio <span class="sort-icon"></span></th>
                            <th class="col-assignee sortable" onclick="sortBy('assignee')">Verantw. <span class="sort-icon"></span></th>
                            <th class="col-labels">Labels</th>
                            <th class="col-actions"></th>
                        </tr>
                    </thead>
                    <tbody id="task-body"></tbody>
                </table>
            </div>
            <p id="no-tasks" class="hidden">Keine Aufgaben gefunden.</p>
            <div id="stats-bottom" class="stats stats-bottom"></div>
        </section>

        <!-- Context Menu -->
        <div id="context-menu" class="context-menu hidden">
            <button onclick="ctxAction('complete')">Als erledigt markieren</button>
            <button onclick="ctxAction('reopen')">Als unerledigt markieren</button>
            <div class="ctx-separator"></div>
            <div class="ctx-submenu-wrap" id="ctx-priority-wrap">
                <button class="ctx-has-sub">Priorit&auml;t &auml;ndern &#9656;</button>
                <div class="ctx-submenu" id="ctx-priority-sub">
                    <button onclick="ctxAction('priority',4)"><span class="priority-dot p1-dot"></span> P1</button>
                    <button onclick="ctxAction('priority',3)"><span class="priority-dot p2-dot"></span> P2</button>
                    <button onclick="ctxAction('priority',2)"><span class="priority-dot p3-dot"></span> P3</button>
                    <button onclick="ctxAction('priority',1)"><span class="priority-dot p4-dot"></span> P4</button>
                </div>
            </div>
            <div class="ctx-submenu-wrap" id="ctx-assignee-wrap">
                <button class="ctx-has-sub">Verantwortlichen &auml;ndern &#9656;</button>
                <div class="ctx-submenu" id="ctx-assignee-sub"></div>
            </div>
            <div class="ctx-submenu-wrap" id="ctx-labels-wrap" style="display:none">
                <button class="ctx-has-sub">Label entfernen &#9656;</button>
                <div class="ctx-submenu" id="ctx-labels-sub"></div>
            </div>
            <div class="ctx-submenu-wrap" id="ctx-addlabel-wrap" style="display:none">
                <button class="ctx-has-sub">Label hinzuf&uuml;gen &#9656;</button>
                <div class="ctx-submenu" id="ctx-addlabel-sub"></div>
            </div>
            <div class="ctx-separator"></div>
            <button onclick="ctxAction('addSubtask')">Unteraufgabe hinzuf&uuml;gen</button>
            <button onclick="ctxAction('move')">Verschieben...</button>
            <button onclick="ctxAction('duplicate')">Duplizieren</button>
            <button onclick="ctxAction('openTodoist')">In Todoist &ouml;ffnen</button>
            <div class="ctx-separator"></div>
            <button class="ctx-danger" onclick="ctxAction('confirmDelete')">L&ouml;schen</button>
        </div>

        <!-- View Name Dialog -->
        <div id="view-name-dialog" class="modal-overlay hidden" onclick="if(event.target===this)closeViewNameDialog()">
            <div class="modal-card">
                <h3>Ansicht speichern</h3>
                <input type="text" id="view-name-input" placeholder="Name der Ansicht..." maxlength="20">
                <div class="modal-actions">
                    <button class="btn-small" onclick="closeViewNameDialog()">Abbrechen</button>
                    <button class="btn-small btn-success" onclick="confirmSaveView()">Speichern</button>
                </div>
            </div>
        </div>

        <!-- Confirm Dialog -->
        <div id="confirm-dialog" class="modal-overlay hidden" onclick="if(event.target===this)closeConfirmDialog(false)">
            <div class="modal-card">
                <h3 id="confirm-title">Best&auml;tigen</h3>
                <p id="confirm-message"></p>
                <div class="modal-actions">
                    <button class="btn-small" onclick="closeConfirmDialog(false)">Abbrechen</button>
                    <button class="btn-small btn-danger" id="confirm-ok" onclick="closeConfirmDialog(true)">L&ouml;schen</button>
                </div>
            </div>
        </div>

        <!-- Create Task Dialog -->
        <div id="create-task-dialog" class="modal-overlay hidden" onclick="if(event.target===this)closeCreateTaskDialog()">
            <div class="modal-card modal-card-wide">
                <h3>Neue Aufgabe</h3>
                <input type="text" id="new-task-content" placeholder="Aufgabenname..." autofocus>
                <div class="create-task-options">
                    <div class="create-task-row">
                        <label>Priorit&auml;t</label>
                        <select id="new-task-priority">
                            <option value="1">P4</option>
                            <option value="2">P3</option>
                            <option value="3">P2</option>
                            <option value="4">P1</option>
                        </select>
                    </div>
                    <div class="create-task-row">
                        <label>Verantwortlich</label>
                        <select id="new-task-assignee"></select>
                    </div>
                    <div class="create-task-row create-task-row-full">
                        <label>Labels</label>
                        <div class="label-picker" id="new-task-labels"></div>
                    </div>
                    <div class="create-task-row create-task-row-full">
                        <label>&Uuml;bergeordnet</label>
                        <div class="task-picker" id="new-task-parent-picker">
                            <input type="text" id="new-task-parent-search" placeholder="Suchen..." oninput="filterTaskPicker('new-task-parent')">
                            <input type="hidden" id="new-task-parent">
                            <div class="task-picker-selected" id="new-task-parent-selected">(Keine &ndash; oberste Ebene)</div>
                            <div class="task-picker-list" id="new-task-parent-list"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn-small" onclick="closeCreateTaskDialog()">Abbrechen</button>
                    <button class="btn-small btn-success" onclick="confirmCreateTask()">Erstellen</button>
                </div>
            </div>
        </div>

        <!-- Move Task Dialog -->
        <div id="move-dialog" class="modal-overlay hidden" onclick="if(event.target===this)closeMoveDialog()">
            <div class="modal-card modal-card-wide">
                <h3>Verschieben</h3>
                <div class="task-picker" id="move-task-picker">
                    <input type="text" id="move-task-search" placeholder="Aufgabe suchen..." oninput="filterTaskPicker('move-task')" autofocus>
                    <div class="task-picker-list" id="move-task-list"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn-small" onclick="closeMoveDialog()">Abbrechen</button>
                    <button class="btn-small btn-success" onclick="confirmMoveTask(null)">&#8593; Oberste Ebene</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast hidden">
            <span id="toast-msg"></span>
            <button id="toast-undo" class="toast-undo hidden" onclick="executeUndo()">R&uuml;ckg&auml;ngig</button>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui/toast.js"></script>
    <script src="js/ui/table.js"></script>
    <script src="js/ui/filters.js"></script>
    <script src="js/ui/dialogs.js"></script>
    <script src="js/ui/menus.js"></script>
    <script src="js/actions.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
